id: ttrm_v8_2026-05-17
date: "2026-05-17"
name: Mamba-YOLO-T-VID-TTRM-v8
status: current_main

constraint:
  keep_backbone: official Mamba-YOLO-T
  keep_neck: official Mamba-YOLO-T neck / feature pyramid
  editable_parts:
    - VID input window organization
    - Detect_VID temporal feature adapter
    - track-id tube supervision in the loss
    - tubelet-level temporal refinement during video extra evaluation

architecture:
  input: 16-frame VID window
  backbone_neck_flow:
    - flatten window frames into an image batch
    - run each frame through Mamba-YOLO-T backbone once
    - run each frame through Mamba-YOLO neck once
    - keep official backbone/neck topology unchanged
    - produce P3/P4/P5 features for every frame
  head:
    name: Detect_VID
    temporal_module:
      name: TemporalResidualFeatureAdapter
      placement: before the original Detect bbox/class branches
      levels: P3/P4/P5
  training_supervision:
    source: raw VisDrone2019-VID annotations track_id field
    placement: v8VIDDetectionLoss
    losses:
      - tube class recall loss sampled at GT box centers on P3/P4/P5
      - same-track confidence continuity loss inside each video window
  video_refinement:
    name: Temporal Tubelet Refinement Module
    script: tools/refine_visdrone_vid_tubelets.py
    placement: after raw detection export and before flicker/MOT evaluation
    steps:
      - greedy local association into tubelets
      - tubelet-level class voting
      - tubelet-level score propagation
      - short-gap interpolation for missed frames
      - light box smoothing along the tubelet
    outputs:
      - refined per-frame detections for flicker
      - refined track txt files with stable tubelet ids for MOT/ID

main_hyperparameters:
  vid_clip_mode: window
  vid_window_size: 16
  num_ref_frames: 15
  clip_stride: 1
  ref_sample: adjacent
  temporal_fusion: trfa
  trfa_levels: all
  trfa_warmup_epochs: 5
  trfa_alpha_target: 1.0
  track_recall_loss: 0.5
  track_consistency_loss: 0.2
  ref_aux_loss: 0.0
  extra_eval_ttrm: true
  ttrm_seed_score: 0.05
  ttrm_attach_score: 0.001
  ttrm_keep_score: 0.03
  ttrm_track_min_len: 2
  ttrm_track_min_score: 0.08
  ttrm_assoc_iou: 0.18
  ttrm_assoc_center_factor: 2.5
  ttrm_max_gap: 3
  ttrm_gap_fill: 2
  ttrm_smooth: 0.55
  ttrm_vote_gain: 0.75
  ttrm_recall_gain: 0.65
  ttrm_input_topk: 180
  ttrm_max_per_frame: 300
  debug_ttrm: true

