notes:
  - This variant intentionally removes the heavier temporal adapter and YOLOV proposal refiner from the main path.
  - The goal is to improve video metrics with a simpler, more explainable score-level temporal stabilizer.
  - Expected strengths are lower flicker, fewer ID switches, fewer fragments, and better short-gap recall without changing current-frame boxes.
