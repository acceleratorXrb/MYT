id: temporal_residual_v6_2026-05-16
date: "2026-05-16"
name: Mamba-YOLO-T-VID-TRFA-v6
status: current_main

constraint:
  keep_backbone: official Mamba-YOLO-T
  keep_neck: official Mamba-YOLO-T neck / feature pyramid
  editable_parts:
    - VID input window organization
    - Detect_VID temporal feature adapter
    - offline video detection / flicker / MOT-ID evaluation path

architecture:
  input: 16-frame VID window
  backbone_neck_flow:
    - flatten window frames into an image batch
    - run each frame through Mamba-YOLO-T backbone once
    - run each frame through Mamba-YOLO neck once
    - keep official backbone/neck topology unchanged
    - produce P3/P4/P5 features for every frame
  head:
    name: Detect_VID
    temporal_module:
      name: TemporalResidualFeatureAdapter
      placement: before the original Detect bbox/class branches
      levels: P3/P4/P5
      structure:
        - 1x1 channel reduction
        - local 3x3x3 depthwise Conv3d over time/height/width
        - 1x1 channel expansion
        - residual alpha gate
    regression: original YOLOv8/Mamba-YOLO bbox distribution branch after TRFA
    classification: original YOLOv8/Mamba-YOLO class branch after TRFA
  output: per-frame bbox regression and class scores from temporally adapted features

main_hyperparameters:
  vid_clip_mode: window
  vid_window_size: 16
  num_ref_frames: 15
  clip_stride: 1
  ref_sample: adjacent
  temporal_fusion: trfa
  trfa_levels: all
  trfa_warmup_epochs: 5
  trfa_alpha_target: 1.0
  ref_aux_loss: 0.0

training_base:
  config: ultralytics/cfg/models/mamba-yolo/Mamba-YOLO-T-VID.yaml
  data: ultralytics/cfg/datasets/VisDrone-VID.yaml
  data_task: vid
  init_weights: output_dir/visdrone_vid/baseline/weights/best.pt
  optimizer: AdamW
  lr0: 0.0005
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.0005
  box: 7.5
  cls: 0.5
  dfl: 1.5
  epochs: 30
  imgsz: 640
  batch_size: 2
  workers: 8
  mosaic: 0.0
  mixup: 0.0

