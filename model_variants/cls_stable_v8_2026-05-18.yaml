notes:
  - This replaces the failed TTRM direction with an in-model, no-output-amplification change.
  - The bbox branch uses original current-frame features to protect localization and avoid track explosion.
  - The classification branch uses temporal features plus same-track class distribution consistency to target flicker and ID switches.
