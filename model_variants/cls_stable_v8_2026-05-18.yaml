id: cls_stable_v8_2026-05-18
date: "2026-05-18"
name: Mamba-YOLO-T-VID-ClsStable-v8
status: current_main

constraint:
  keep_backbone: official Mamba-YOLO-T
  keep_neck: official Mamba-YOLO-T neck / feature pyramid
  editable_parts:
    - VID input window organization
    - Detect_VID temporal classification adapter
    - track-id tube supervision in the loss
    - offline video detection / flicker / MOT-ID evaluation path

architecture:
  input: 16-frame VID window
  backbone_neck_flow:
    - flatten window frames into an image batch
    - run each frame through Mamba-YOLO-T backbone once
    - run each frame through Mamba-YOLO neck once
    - keep official backbone/neck topology unchanged
    - produce P3/P4/P5 features for every frame
  head:
    name: Detect_VID
    temporal_module:
      name: TemporalResidualFeatureAdapter
      placement: before Detect branches
      levels: P3/P4/P5
      branch: cls
      reason: preserve current-frame bbox regression while stabilizing classification logits
  track_tube_supervision:
    source: raw VisDrone2019-VID annotations track_id field
    placement: v8VIDDetectionLoss
    losses:
      - tube class recall loss sampled at GT box centers on P3/P4/P5
      - same-track true-class confidence continuity loss inside each window
      - same-track full class-distribution consistency loss inside each window
  output: per-frame bbox regression from original features and class scores from temporally adapted features

main_hyperparameters:
  vid_clip_mode: window
  vid_window_size: 16
  num_ref_frames: 15
  clip_stride: 1
  ref_sample: adjacent
  temporal_fusion: trfa
  trfa_levels: all
  trfa_branch: cls
  trfa_warmup_epochs: 5
  trfa_alpha_target: 1.0
  track_recall_loss: 0.5
  track_consistency_loss: 0.2
  track_cls_consistency_loss: 0.1
  ref_aux_loss: 0.0

