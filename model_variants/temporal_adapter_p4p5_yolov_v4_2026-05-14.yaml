notes:
  - This variant keeps the v3 YOLOV-style proposal head but restricts feature-level temporal aggregation to P4/P5.
  - P3 is bypassed because VisDrone small targets depend heavily on high-resolution P3 features, and the all-level v3 adapter improved stability while still losing recall.
  - Use this as the next recall-recovery experiment before considering backbone/neck changes.
